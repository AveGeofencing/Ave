services:
  api:
    build:
      context: .
      dockerfile: Dockerfile  # Dockerfile for FastAPI app
    ports:
      - "8000:8000"  # Expose FastAPI to port 8000
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://admin:password@pg_db:5432/geofencedb
    develop:
      watch:
        - action: sync+restart
          path: .
          target: /app

    volumes:
        - uv_cache:/root/.cache/uv
    networks:
      - default  # Use the default network

  pg_db:
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: geofencedb
    ports:
      - "5431:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - default

  # Define volumes at the bottom
volumes:
  db_data:  # Named volume for MySQL
  pgdata:
  uv_cache:

networks:
  default:
    driver: bridge
